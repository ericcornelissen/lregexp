# SPDX-License-Identifier: MIT

name: Nightly
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: ~

permissions: read-all

jobs:
  test:
    name: Test against latest runtime dependency versions on ${{ matrix.runtime }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - bun
          - deno
          - node
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: 26.3.0
      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Install dependencies
        run: npm clean-install
      - name: Bump runtime dependencies to latest compatible
        run: |
          npm update --omit dev --omit optional --omit peer
          npm ls --all --omit dev --omit optional --omit peer
      - name: Run tests
        run: just "test-${RUNTIME}"
        env:
          RUNTIME: ${{ matrix.runtime }}
